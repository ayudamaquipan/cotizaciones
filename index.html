<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Maquipan - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --primary: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-top: 12px; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .carga-pdf { border: 2px dashed var(--primary); background: #eef6ff; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; margin-bottom: 15px; }
        
        .preview-container { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 20px; font-family: Arial, sans-serif; font-size: 0.9rem; color: #333; height: 420px; overflow-y: auto; }
        .preview-header { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--primary); font-size: 0.85rem; line-height: 1.6; }
        .preview-header strong { color: #555; width: 60px; display: inline-block; }
        
        .btn-enviar { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #log-status { font-size: 0.8rem; color: #666; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-grid">
    <div class="card">
        <h2>🛠 Configuración Maquipan</h2>
        <div class="carga-pdf" onclick="document.getElementById('archivoPdf').click()">
            <span id="label-archivo">📁 Cargar Cotización PDF</span>
            <input type="file" id="archivoPdf" accept=".pdf" style="display:none" onchange="procesarArchivo(this)">
            <div id="log-status">Esperando archivo...</div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1">
                <label>N° Cotización</label>
                <input type="text" id="numCotizacion" oninput="actualizarVista()">
            </div>
            <div style="flex:2">
                <label>Local (Asunto)</label>
                <input type="text" id="nombreLocal" oninput="actualizarVista()">
            </div>
        </div>

        <label>Correo Cliente</label>
        <input type="email" id="emailDestino" placeholder="cliente@ejemplo.cl" oninput="actualizarVista()">

        <label>Texto extra en Asunto</label>
        <input type="text" id="textoAdicional" oninput="actualizarVista()">

        <label>Repuestos Filtrados (>$7.000)</label>
        <textarea id="listaRepuestos" rows="6" oninput="actualizarVista()"></textarea>

        <button class="btn-enviar" id="btnEnviar" onclick="enviarCorreo()">ENVIAR POR GMAIL</button>
    </div>

    <div class="card">
        <h2>👁 Previsualización del Envío</h2>
        
        <div class="preview-header">
            <div><strong>Asunto:</strong> <span id="prevAsunto"></span></div>
            <div><strong>Para:</strong> <span id="prevPara"></span></div>
            <div><strong>CC:</strong> <span>cpimentel@maquipan.cl, emorales@maquipan.cl, jvillarroel@maquipan.cl, kcarrasco@maquipan.cl</span></div>
        </div>

        <div id="previewCuerpo" class="preview-container"></div>
    </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfBase64 = null;
    let nombreArchivo = "";
    const correosCC = "cpimentel@maquipan.cl, emorales@maquipan.cl, jvillarroel@maquipan.cl, kcarrasco@maquipan.cl";

    async function procesarArchivo(input) {
        const file = input.files[0];
        const status = document.getElementById('log-status');
        if (!file) return;
        
        status.innerText = "⏳ Extrayendo datos...";
        nombreArchivo = file.name;

        try {
            const reader = new FileReader();
            reader.onload = e => pdfBase64 = e.target.result;
            reader.readAsDataURL(file);

            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            const page = await pdf.getPage(1);
            const content = await page.getTextContent();
            const items = content.items;
            const fullText = items.map(i => i.str).join(" ");

            const cotMatch = fullText.match(/COTIZACI[OÓ]N:\s*(\d+)/i);
            if (cotMatch) document.getElementById('numCotizacion').value = cotMatch[1];

            const localMatch = fullText.match(/MAIL:.*?@[a-z.]+\s+(.*?)(?=\s+["']?Código["']?)/i);
            const localName = localMatch ? localMatch[1].trim() : "";
            document.getElementById('nombreLocal').value = localName;

            let repuestosFinales = [];
            const palabrasProhibidas = ["TOTAL", "NETO", "IVA", "DESCUENTO", "SUB", "CÓDIGO", "CANTIDAD", "VALOR", "U. MED"];

            for (let i = 0; i < items.length; i++) {
                let texto = items[i].str.trim();
                if (texto.match(/^\d{1,3}([.,]\d{3})+$/)) {
                    let valorNumeric = parseInt(texto.replace(/[.,]/g, ''));
                    if (valorNumeric >= 7000) {
                        let nombreCompleto = "";
                        let j = i - 1;
                        let maxRetroceso = 0;
                        while (j >= 0 && maxRetroceso < 4) {
                            let palabra = items[j].str.trim();
                            if (palabra.match(/^\d+$/) && palabra.length < 5) break;
                            if (palabrasProhibidas.some(p => palabra.toUpperCase().includes(p))) break;
                            if (palabra === localName) break;
                            if (palabra.length > 2) nombreCompleto = palabra + " " + nombreCompleto;
                            j--; maxRetroceso++;
                        }
                        if (nombreCompleto.trim().length > 5) {
                            // Guardamos el repuesto limpio en el textarea
                            repuestosFinales.push(nombreCompleto.trim());
                        }
                    }
                }
            }

            document.getElementById('listaRepuestos').value = [...new Set(repuestosFinales)].join("\n");
            status.innerText = "✅ Datos cargados correctamente";
            actualizarVista();

        } catch (error) {
            status.innerText = "❌ Error en el PDF";
        }
    }

    function actualizarVista() {
        const cot = document.getElementById('numCotizacion').value || "____";
        const local = document.getElementById('nombreLocal').value || "____";
        const extra = document.getElementById('textoAdicional').value;
        const repuestos = document.getElementById('listaRepuestos').value.split('\n').filter(r => r.trim());
        const destino = document.getElementById('emailDestino').value || "___@___";

        let asunto = `COT. ${cot} ${local}`;
        if (extra.trim()) asunto += ` - ${extra}`;
        
        document.getElementById('prevAsunto').innerText = asunto;
        document.getElementById('prevPara').innerText = destino;

        // Armar lista de repuestos en HTML (con negritas)
        let listaRepuestosHtml = "";
        repuestos.forEach(r => {
            // Limpiar posibles viñetas manuales
            let limpio = r.replace(/^[•\-\*]+/, '').trim();
            listaRepuestosHtml += `<li style="margin-bottom: 5px;"><b>${limpio}</b></li>`;
        });

        // CUERPO CON DISEÑO HTML REAL
        let cuerpoHtml = `
            <div style="font-family: Arial, sans-serif; color: #333; line-height: 1.6; max-width: 650px;">
                <p>Estimado/a,</p>
                <p>Espero que se encuentre muy bien.</p>
                <p>De acuerdo con nuestra revisión técnica y con el objetivo de asegurar el <b>ÓPTIMO FUNCIONAMIENTO</b> de sus equipos en el local <b>${local}</b>, le adjunto la cotización correspondiente a los repuestos y/o servicios requeridos.</p>
                
                <p>📄 <b>DETALLES DE LA COTIZACIÓN:</b><br>
                • N° de Cotización: <b>${cot}</b></p>
                
                <p>🔧 <b>REPUESTOS Y SERVICIOS INCLUIDOS:</b></p>
                <ul style="margin-top: 5px;">
                    ${listaRepuestosHtml}
                </ul>
                
                <p>Para poder avanzar con la gestión y agendar los trabajos a la brevedad, le agradecería que, en caso de estar conforme, nos pueda emitir la <b>ORDEN DE COMPRA (OC)</b> correspondiente.</p>
                
                <p>Quedo a su entera disposición por si tiene alguna duda técnica o requiere mayor información sobre esta cotización.</p>
                
                <p>Saludos cordiales,<br><br>
                <b>Cristian</b><br>
                Supervisor de Servicio Técnico<br>
                <b>Maquipan</b></p>
            </div>
        `;

        // InnerHTML es el que permite que veamos las negritas en la previsualización
        document.getElementById('previewCuerpo').innerHTML = cuerpoHtml;
        window.cuerpoParaEnviar = cuerpoHtml; // Guardamos el HTML para el envío
    }

    async function enviarCorreo() {
        const btn = document.getElementById('btnEnviar');
        const destino = document.getElementById('emailDestino').value;
        if (!destino) return alert("Ingresa el correo del cliente.");

        btn.disabled = true;
        btn.innerText = "🚀 Enviando...";

        try {
            const res = await fetch('/api/enviar_correo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    destino: destino,
                    cc: correosCC,
                    asunto: document.getElementById('prevAsunto').innerText,
                    cuerpoHtml: window.cuerpoParaEnviar, // Enviamos el HTML al servidor
                    adjunto: pdfBase64,
                    nombreArchivo: nombreArchivo
                })
            });
            if (res.ok) alert("✅ ¡Correo enviado!"); else alert("❌ Error");
        } catch (e) { alert("❌ Error de red"); }
        finally { btn.disabled = false; btn.innerText = "ENVIAR POR GMAIL"; }
    }
    actualizarVista();
</script>
</body>
</html>
